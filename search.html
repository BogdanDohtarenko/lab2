<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Results | Cooks Delight</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Roboto:wght@300;400;500&family=Homemade+Apple&display=swap" rel="stylesheet">
    <script type="module" src="js/script.js" defer></script>
</head>
<body>

    <header class="main-header">
        <nav class="container nav-bar">
            <div class="logo">
                <img src="images/logo.png" alt="Logo" class="logo-icon" title="logo">
                <strong>Cooks<br>Delight</strong>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="recipe.html">Recipes</a></li>
                <li><a href="#">Cooking Tips</a></li>
                <li><a href="index.html#about">About Us</a></li>
            </ul>
            <div class="nav-controls">
                <form action="search.html" method="GET" class="search-form">
                    <input type="text" name="q" placeholder="Find a recipe..." required class="search-input">
                    <button type="submit" class="search-btn" aria-label="Search"><img src="images/Search.png" alt="search"></button>
                </form>
            </div>
        </nav>
    </header>

    <main class="container search-page-main">
        <h2 id="search-title" class="search-section-title">Search Results</h2>
        <div id="results-container" class="recipe-grid search-results-grid">
            </div>

        <h2 class="search-section-title">My Favorite Recipes</h2>
        <div id="favorites-container" class="recipe-grid">
            </div>
    </main>

    <footer class="main-footer container">
        <div class="footer-wrapper">
            <div class="logo-footer">
                <img src="images/logo.png" alt="Logo" class="footer-logo-icon"> <span>Cooks<br>Delight</span>
            </div>
            <p class="copyright">Copyright: &copy; 2026 Cooks Delight.</p>
        </div>
    </footer>

</body>
</html>
